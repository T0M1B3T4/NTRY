services:
  mongo:
    image: mongo:7
    container_name: mongo_logs
    ports:
      - "27017:27017"
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - siem-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=mongodb-mongodb-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - mongo
    networks:
      - siem-network
      
  producer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.producer
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      - DB_NAME=${DB_NAME}
      - COLLECTION_NAME=${COLLECTION_NAME}
    depends_on:
      - mongo
    networks:
      - siem-network

volumes:
  mongo_data:
  grafana_data:

networks:
  siem-network:
